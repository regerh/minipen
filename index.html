<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- SEO 최적화: 타이틀 변경 (핵심 키워드 포함) -->
    <title>MiniPen: 실시간 HTML, CSS, JS 에디터 - 온라인 코드 편집기</title>
    <!-- SEO 최적화: 메타 디스크립션 추가 (검색 결과에 노출) -->
    <meta name="description" content="MiniPen은 브라우저에서 즉시 HTML, CSS, JavaScript 코드를 작성하고 실행 결과를 미리 볼 수 있는 무료 온라인 코드 에디터입니다. 프론트엔드 개발 연습, 코드 스니펫 테스트, 웹 페이지 학습에 최적화된 라이브 편집 환경을 제공합니다.">

    <!-- hreflang 태그: 검색 엔진에 다른 언어 버전이 있음을 알림 -->
    <link rel="alternate" href="https://[YOUR_VERCEL_DOMAIN]/en.html" hreflang="en" />
    <link rel="alternate" href="https://[YOUR_VERCEL_DOMAIN]/index.html" hreflang="ko" />
    <!-- x-default: 언어 설정이 없는 사용자에게 보여줄 기본 페이지 (여기서는 한국어 페이지) -->
    <link rel="alternate" href="https://[YOUR_VERCEL_DOMAIN]/index.html" hreflang="x-default" />

    <style>
        :root {
            --bg: #1e1e1e;
            --panel-bg: #252526;
            --text: #d4d4d4;
            --accent: #007acc;
            --border: #3e3e3e;
            --tab-active: #1e1e1e;
            --tab-inactive: #2d2d2d;
            --lang-active-bg: #007acc; /* 언어 선택 버튼 활성화 색상 */
            --lang-inactive-bg: #3c3c3c; /* 언어 선택 버튼 비활성화 색상 */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 헤더 */
        .header {
            background: #323233;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        /* SEO 최적화: 로고를 <h1> 태그로 변경하고 기존 스타일 유지 */
        .header .logo {
            font-weight: 700;
            font-size: 16px;
            color: #fff;
            margin: 0;
        }
        .header .logo span {
            color: var(--accent);
        }
        .header button {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 6px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: background 0.15s;
        }
        .header button:hover {
            background: #1c8ad4;
        }
        .header button.auto {
            background: #4caf50;
        }
        .header button.auto.active {
            background: #ff9800;
        }
        .header select {
            background: #3c3c3c;
            color: #d4d4d4;
            border: 1px solid var(--border);
            padding: 5px 8px;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
        }
        /* 언어 선택 버튼 스타일 */
        .lang-switcher {
            margin-left: auto; /* 오른쪽으로 정렬 */
            display: flex;
            gap: 8px;
        }
        .lang-switcher a {
            color: var(--text);
            text-decoration: none;
            padding: 6px 10px;
            border-radius: 4px;
            background: var(--lang-inactive-bg);
            font-size: 13px;
            transition: background 0.15s;
        }
        .lang-switcher a:hover {
            background: #555;
        }
        .lang-switcher a.active {
            background: var(--lang-active-bg);
            font-weight: 600;
        }

        /* 메인 영역 */
        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* 에디터 패널 */
        .editor-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            border-right: 1px solid var(--border);
        }

        /* 탭 */
        .tabs {
            display: flex;
            background: #252526;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .tab {
            padding: 8px 16px;
            cursor: pointer;
            font-size: 13px;
            border-right: 1px solid var(--border);
            background: var(--tab-inactive);
            transition: background 0.1s;
            user-select: none;
        }
        .tab.active {
            background: var(--tab-active);
            border-bottom: 2px solid var(--accent);
            margin-bottom: -1px;
        }
        .tab:hover {
            background: #2a2a2a;
        }

        /* 코드 에디터 */
        .code-area {
            flex: 1;
            position: relative;
            overflow: hidden;
        }
        textarea {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1e1e1e;
            color: #d4d4d4;
            border: none;
            resize: none;
            padding: 12px;
            font-family: 'Consolas', 'Courier New', 'D2Coding', monospace;
            font-size: 14px;
            line-height: 1.6;
            tab-size: 2;
            outline: none;
            display: none;
        }
        textarea.visible {
            display: block;
        }

        /* 프리뷰 패널 */
        .preview-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }
        .preview-header {
            background: #252526;
            padding: 6px 12px;
            font-size: 12px;
            color: #999;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .resize-handle {
            width: 4px;
            cursor: col-resize;
            background: transparent;
            flex-shrink: 0;
            transition: background 0.2s;
            position: relative;
            z-index: 10;
        }
        .resize-handle:hover,
        .resize-handle.active {
            background: var(--accent);
        }
        iframe {
            flex: 1;
            border: none;
            background: #fff;
            width: 100%;
        }

        /* 에러 콘솔 */
        .console {
            height: 100px;
            background: #1a1a1a;
            border-top: 1px solid var(--border);
            overflow-y: auto;
            padding: 8px 12px;
            font-family: 'Consolas', monospace;
            font-size: 12px;
            flex-shrink: 0;
            display: none;
        }
        .console.visible {
            display: block;
        }
        .console .error {
            color: #f44747;
        }
        .console .warn {
            color: #cca700;
        }
        .console .info {
            color: #6a9955;
        }

        /* 반응형 */
        @media (max-width: 768px) {
            .main {
                flex-direction: column;
            }
            .editor-panel {
                border-right: none;
                border-bottom: 1px solid var(--border);
                flex: 0 0 45%;
            }
            .preview-panel {
                flex: 1;
            }
            .resize-handle {
                width: 100%;
                height: 4px;
                cursor: row-resize;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <!-- SEO 최적화: 로고를 <h1> 태그로 변경 -->
        <h1 class="logo">🎨 Mini<span>Pen</span></h1>
        <button id="btnRun">▶ 실행 (Ctrl+Enter)</button>
        <button id="btnAuto" class="auto">⚡ 자동반영 OFF</button>
        <select id="layoutSelect">
            <option value="split">좌우 분할</option>
            <option value="rows">상하 분할</option>
            <option value="preview-only">프리뷰만</option>
            <option value="editor-only">에디터만</option>
        </select>
        <button id="btnExport" style="background:#555;">📥 HTML 다운로드</button>
        <button id="btnConsole" style="background:#555;">🖥 콘솔</button>

        <!-- 언어 선택 UI 추가 -->
        <div class="lang-switcher">
            <a href="/index.html" class="active">한국어</a>
            <a href="/en.html">English</a>
        </div>
    </div>

    <div class="main" id="mainContainer">
        <!-- 에디터 -->
        <div class="editor-panel" id="editorPanel">
            <div class="tabs">
                <div class="tab active" data-tab="html">HTML</div>
                <div class="tab" data-tab="css">CSS</div>
                <div class="tab" data-tab="js">JavaScript</div>
            </div>
            <div class="code-area">
                <textarea id="htmlCode" class="visible" placeholder="<!-- HTML 코드를 입력하세요 -->" spellcheck="false"><!-- HTML -->
<h1>안녕하세요! 👋</h1>
<p>여기에 HTML을 작성하고 <strong>Ctrl+Enter</strong>로 실행하세요</p>
<button onclick="alert('버튼 클릭!')">테스트 버튼</button></textarea>
                <textarea id="cssCode" placeholder="/* CSS 코드를 입력하세요 */" spellcheck="false">/* CSS */
body {
background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
color: white;
font-family: 'Segoe UI', sans-serif;
text-align: center;
padding: 40px;
}
h1 { font-size: 2em; margin-bottom: 10px; }
button {
padding: 10px 24px;
font-size: 1em;
border: none;
border-radius: 8px;
background: white;
color: #333;
cursor: pointer;
margin-top: 10px;
}
button:hover { background: #eee; }</textarea>
                <textarea id="jsCode" placeholder="// JavaScript 코드를 입력하세요" spellcheck="false">// JavaScript
console.log('MiniPen 실행 완료! 🚀');
console.log('콘솔 버튼을 눌러 로그를 확인하세요');</textarea>
            </div>
        </div>

        <!-- 크기 조절 핸들 -->
        <div class="resize-handle" id="resizeHandle"></div>

        <!-- 프리뷰 -->
        <div class="preview-panel" id="previewPanel">
            <div class="preview-header">👁 프리뷰</div>
            <iframe id="previewFrame" sandbox="allow-scripts allow-modals allow-popups allow-same-origin"></iframe>
        </div>
    </div>

    <div class="console" id="consoleOutput"></div>

    <script>
        // DOM 요소
        const htmlCode = document.getElementById('htmlCode');
        const cssCode = document.getElementById('cssCode');
        const jsCode = document.getElementById('jsCode');
        const previewFrame = document.getElementById('previewFrame');
        const btnRun = document.getElementById('btnRun');
        const btnAuto = document.getElementById('btnAuto');
        const btnExport = document.getElementById('btnExport');
        const btnConsole = document.getElementById('btnConsole');
        const consoleOutput = document.getElementById('consoleOutput');
        const layoutSelect = document.getElementById('layoutSelect');
        const mainContainer = document.getElementById('mainContainer');
        const editorPanel = document.getElementById('editorPanel');
        const previewPanel = document.getElementById('previewPanel');
        const resizeHandle = document.getElementById('resizeHandle');
        const tabs = document.querySelectorAll('.tab');
        const textareas = document.querySelectorAll('textarea');

        // 상태
        let autoRefresh = false;
        let autoTimer = null;
        let consoleVisible = false;
        let capturedLogs = [];

        // ============ 탭 전환 ============
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                const target = tab.dataset.tab;
                textareas.forEach(ta => ta.classList.remove('visible'));
                if (target === 'html') htmlCode.classList.add('visible');
                if (target === 'css') cssCode.classList.add('visible');
                if (target === 'js') jsCode.classList.add('visible');
            });
        });

        // ============ 콘솔 캡처용 스크립트 ============
        function getCaptureScript() {
            return `
<script>
(function() {
    var _log = console.log;
    var _warn = console.warn;
    var _error = console.error;
    var logs = [];
    console.log = function() {
        logs.push({type:'log', msg: Array.from(arguments).map(String).join(' ')});
        _log.apply(console, arguments);
    };
    console.warn = function() {
        logs.push({type:'warn', msg: Array.from(arguments).map(String).join(' ')});
        _warn.apply(console, arguments);
    };
    console.error = function() {
        logs.push({type:'error', msg: Array.from(arguments).map(String).join(' ')});
        _error.apply(console, arguments);
    };
    window.__capturedLogs = logs;
})();
<\/script>`;
        }

        // ============ 프리뷰 업데이트 ============
        function updatePreview() {
            const html = htmlCode.value;
            const css = cssCode.value;
            const js = jsCode.value;

            const fullHTML = `<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>${css}</style>
${getCaptureScript()}
</head>
<body>
${html}
<script>
(function() {
try {
${js}
} catch(e) {
console.error('❌ JavaScript 오류: ' + e.message);
}
})();
<\/script>
</body>
</html>`;

            const blob = new Blob([fullHTML], { type: 'text/html' });
            const url = URL.createObjectURL(blob);

            previewFrame.onload = () => {
                try {
                    const captured = previewFrame.contentWindow.__capturedLogs;
                    if (captured) {
                        capturedLogs = captured;
                        if (consoleVisible) renderConsole();
                    }
                } catch (e) {
                    // cross-origin 무시
                }
                URL.revokeObjectURL(url);
            };

            previewFrame.src = url;
        }

        // ============ 콘솔 렌더링 ============
        function renderConsole() {
            consoleOutput.innerHTML = '';
            capturedLogs.forEach(log => {
                const div = document.createElement('div');
                div.className = log.type === 'error' ? 'error' : log.type === 'warn' ? 'warn' : 'info';
                div.textContent = `[${log.type.toUpperCase()}] ${log.msg}`;
                consoleOutput.appendChild(div);
            });
            consoleOutput.scrollTop = consoleOutput.scrollHeight;
        }

        // ============ 버튼 이벤트 ============
        btnRun.addEventListener('click', updatePreview);

        btnAuto.addEventListener('click', () => {
            autoRefresh = !autoRefresh;
            if (autoRefresh) {
                btnAuto.textContent = '⚡ 자동반영 ON';
                btnAuto.classList.add('active');
                autoTimer = setInterval(() => {
                    updatePreview();
                }, 500);
            } else {
                btnAuto.textContent = '⚡ 자동반영 OFF';
                btnAuto.classList.remove('active');
                clearInterval(autoTimer);
            }
        });

        btnExport.addEventListener('click', () => {
            const html = htmlCode.value;
            const css = cssCode.value;
            const js = jsCode.value;
            const fullHTML = `<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiniPen Export</title>
<style>${css}</style>
</head>
<body>
${html}
<script>${js}<\/script>
</body>
</html>`;
            const blob = new Blob([fullHTML], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'minipen-export.html';
            a.click();
            URL.revokeObjectURL(url);
        });

        btnConsole.addEventListener('click', () => {
            consoleVisible = !consoleVisible;
            if (consoleVisible) {
                consoleOutput.classList.add('visible');
                btnConsole.style.background = '#ff9800';
                renderConsole();
            } else {
                consoleOutput.classList.remove('visible');
                btnConsole.style.background = '#555';
            }
        });

        // ============ 레이아웃 전환 ============
        layoutSelect.addEventListener('change', () => {
            const val = layoutSelect.value;
            if (val === 'split') {
                mainContainer.style.flexDirection = 'row';
                editorPanel.style.display = 'flex';
                previewPanel.style.display = 'flex';
                resizeHandle.style.display = 'block';
                resizeHandle.style.width = '4px';
                resizeHandle.style.height = 'auto';
                resizeHandle.style.cursor = 'col-resize';
            } else if (val === 'rows') {
                mainContainer.style.flexDirection = 'column';
                editorPanel.style.display = 'flex';
                previewPanel.style.display = 'flex';
                resizeHandle.style.display = 'block';
                resizeHandle.style.width = 'auto';
                resizeHandle.style.height = '4px';
                resizeHandle.style.cursor = 'row-resize';
            } else if (val === 'preview-only') {
                editorPanel.style.display = 'none';
                previewPanel.style.display = 'flex';
                resizeHandle.style.display = 'none';
            } else if (val === 'editor-only') {
                editorPanel.style.display = 'flex';
                previewPanel.style.display = 'none';
                resizeHandle.style.display = 'none';
            }
        });

        // ============ 크기 조절 핸들 ============
        let isResizing = false;
        resizeHandle.addEventListener('mousedown', (e) => {
            isResizing = true;
            resizeHandle.classList.add('active');
            document.body.style.userSelect = 'none';
            document.body.style.cursor = layoutSelect.value === 'rows' ? 'row-resize' : 'col-resize';
        });

        document.addEventListener('mousemove', (e) => {
            if (!isResizing) return;
            const rect = mainContainer.getBoundingClientRect();
            if (layoutSelect.value === 'rows') {
                const pct = ((e.clientY - rect.top) / rect.height) * 100;
                if (pct > 15 && pct < 85) {
                    editorPanel.style.flex = `0 0 ${pct}%`;
                    previewPanel.style.flex = `1`;
                }
            } else {
                const pct = ((e.clientX - rect.left) / rect.width) * 100;
                if (pct > 15 && pct < 85) {
                    editorPanel.style.flex = `0 0 ${pct}%`;
                    previewPanel.style.flex = `1`;
                }
            }
        });

        document.addEventListener('mouseup', () => {
            if (isResizing) {
                isResizing = false;
                resizeHandle.classList.remove('active');
                document.body.style.userSelect = '';
                document.body.style.cursor = '';
            }
        });

        // ============ 키보드 단축키 ============
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                e.preventDefault();
                updatePreview();
            }
            if (e.ctrlKey && e.key === 's') {
                e.preventDefault();
                btnExport.click();
            }
        });

        // ============ 초기 실행 ============
        updatePreview();

        console.log('✅ MiniPen 준비 완료!');
        console.log('💡 단축키: Ctrl+Enter = 실행, Ctrl+S = 다운로드');
    </script>

</body>
</html>
